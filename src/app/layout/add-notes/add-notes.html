<div class="main-container flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">

        <!-- Title -->
        <h2 class="text-xl font-semibold text-gray-800 mb-4">
            Add New Note
        </h2>

        <!-- Title Field -->
        <div class="mb-4">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">
                Title
            </label>
            <input type="text" id="title" name="title" placeholder="Enter your title" [(ngModel)]="notesObj.title"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition" />
        </div>

        <!-- Description Field -->
        <div class="mb-5">
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
                Description
            </label>
            <textarea id="description" name="description" rows="8" placeholder="Enter your description"
                [(ngModel)]="notesObj.description"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"></textarea>
        </div>

        <!-- Button -->
        <button class="cursor-pointer w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl shadow-md transition"
            (click)="onAddNote()">
            Add Note
        </button>

    </div>

</div>
